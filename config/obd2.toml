# OBD2 service configuration. See PRD §7.2.
# Deployed to /opt/truckdash/config/obd2.toml by scripts/install.sh.

[adapter]
# Stable symlink created by udev/99-truckdash.rules. The OBDLink EX's VID/PID
# still needs to be filled in there once the device arrives — until then the
# service falls back to autodetect.
device = "/dev/obdlink"
# The EX enumerates as a USB CDC-ACM device, so baudrate is nominal. Keep at
# 115200 to match what python-OBD defaults to for ELM/STN adapters.
baudrate = 115200
# "auto" lets the adapter negotiate the protocol. The 2001 7.3L PCM speaks
# J1850 PWM on HS; Ford's MS-CAN only exists on newer trucks. If autodetect
# is flaky on the vehicle, pin to "SAE J1850 PWM" (python-OBD protocol "1").
protocol = "auto"

# Connect / retry behaviour. All in seconds.
[adapter.retry]
adapter_missing = 5    # no /dev/obdlink — dongle unplugged
vehicle_off = 30       # adapter present but ECU not responding (key off)
backoff_max = 60       # cap on successive failures

# ---------------------------------------------------------------------------
# Standard OBD-II Mode 01 PIDs. These are generic and will respond on
# essentially any OBD-II-compliant vehicle, the 2001 7.3L included. These
# alone satisfy the "≥6 PIDs at ≥2 Hz" Phase 2 acceptance criterion.
# ---------------------------------------------------------------------------

[[pids]]
name = "rpm"
display = "RPM"
mode = "01"
pid = "0C"
rate_hz = 5
units = "rpm"

[[pids]]
name = "coolant_temp"
display = "Coolant"
mode = "01"
pid = "05"
rate_hz = 2
units = "°C"

[[pids]]
name = "speed"
display = "Speed"
mode = "01"
pid = "0D"
rate_hz = 5
# python-OBD decodes PID 0D as km/h; scale converts to mph for the dash.
scale = 0.621371
units = "mph"

[[pids]]
name = "intake_temp"
display = "IAT"
mode = "01"
pid = "0F"
rate_hz = 2
units = "°C"

[[pids]]
name = "engine_load"
display = "Load"
mode = "01"
pid = "04"
rate_hz = 2
units = "%"

[[pids]]
name = "throttle_pos"
display = "Throttle"
mode = "01"
pid = "11"
rate_hz = 5
units = "%"

[[pids]]
name = "fuel_level"
display = "Fuel"
mode = "01"
pid = "2F"
rate_hz = 1
units = "%"

# ---------------------------------------------------------------------------
# Ford Mode 22 enhanced PIDs for the 7.3L Power Stroke.
#
# Verified against a 2001 F-250 7.3L PCM on 2026-05-07 via
# obd2/tools/probe_mode22.py + a paired FORScan CSV capture. The PCM
# requires the Ford SCP header `ATSH C410F1` (priority C4, target=PCM
# functional 10, source=tester F1) before a `22 PPQQ` request will get
# anything other than NO DATA. The daemon must send that header on the
# adapter for these entries to work — see truckdash_obd2/adapter.py.
#
# Probe report: obd2/probe-2.txt
# Cross-reference data: C:/Users/eric/Documents/FORScan/new.csv
# Memory: memory/mode22_clone_blocker.md
# ---------------------------------------------------------------------------

[[pids]]
name = "eot"
display = "Oil Temp"
mode = "22"
pid = "1310"
rate_hz = 1
units = "°F"
# Confirmed: response payload is 3 bytes, only byte 0 is data; bytes 1-2
# appear to be unrelated padding. byte 0 is engine oil temperature in °C
# (raw 0x24 read at idle = 36 °C, matched FORScan exactly). Convert °C → °F.
byte_count = 1
scale = 1.8
offset = 32.0

[[pids]]
name = "tot"
display = "Trans Temp"
mode = "22"
pid = "1128"
rate_hz = 1
units = "°F"
# Confirmed 2026-05-07 KOEO: response payload is 3 bytes BE; the value
# lives in byte 2 with leading zeros (e.g. `00 00 17` = 23). Big-endian
# uint over the full 3 bytes gives the same answer for all realistic
# trans temps (≤255 °C, easily). Direct °C; convert to °F.
# Note: this address was originally guessed as "ICP_alt" in the probe
# candidate list — the data was right there in probe-2.txt and we
# re-decoded it correctly on the second pass. See obd2/PIDS.md.
byte_count = 3
scale = 1.8
offset = 32.0

[[pids]]
name = "icp"
display = "ICP"
mode = "22"
pid = "1434"
rate_hz = 5
units = "psi"
# Confirmed: 2-byte big-endian payload in kPa (0x0F06 = 3846 kPa at idle,
# matched FORScan ICP 3734 kPa within sample variation). Convert kPa → psi.
byte_count = 2
scale = 0.1450377
offset = 0.0

